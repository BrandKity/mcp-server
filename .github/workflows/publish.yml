name: Publish to npm

on:
  release:
    types: [published]
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for OIDC Trusted Publisher

jobs:
  publish:
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/') || startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    environment: npm-publish # Must match the Environment name set on npmjs.com Trusted Publisher form

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish with provenance
        run: npm publish --access public --provenance
